name: Build and Publish on Commit

concurrency:
  group: "build"
  cancel-in-progress: false

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Read Minecraft version
        id: mc
        shell: bash
        run: |
          MC_VERSION="$(node -e "import { getMcVersion } from './.github/builds/mc_version.js'; const v = await getMcVersion(); process.stdout.write(v);")"
          echo "mc_version=$MC_VERSION" >> "$GITHUB_OUTPUT"
      
      - name: Create tag name
        id: vars
        shell: bash
        run: |
          shortsha="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "tag=build-mc${{ steps.mc.outputs.mc_version }}-$shortsha" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build -Pcommit=${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Meteor Client (MC ${{ steps.mc.outputs.mc_version }}) — ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: build/libs/*
          body: |
            Automated Meteor build release
            - Commit: ${{ github.sha }}
            - Build date: ${{ steps.prep.outputs.build_date }}
